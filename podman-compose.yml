version: "3.8"

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
